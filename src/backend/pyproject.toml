[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.messages_control]
disable = [
    "C0114",  # missing-module-docstring
    "R0903",  # too-few-public-methods
]

[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "-v --color=yes --tb=short --cov=app --cov-report=html --cov-report=term-missing"
testpaths = ["tests"]
norecursedirs = [".git", "venv", "env", ".*", "_*", "build", "dist", "htmlcov", "alembic"]
