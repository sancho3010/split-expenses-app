name: Panic Button | Rollback Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a hacer rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      component:
        description: 'Componente a hacer rollback'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - ambos

      confirm:
        description: 'Escribe CONFIRMAR para proceder'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRMAR'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.TF_REGION_NAME }}

      - name: Rollback backend service
        if: github.event.inputs.component == 'backend' || github.event.inputs.component == 'ambos'
        env:
          CLUSTER: splitwise-lite-${{ github.event.inputs.environment }}-ecs-cluster
          SERVICE: splitwise-lite-${{ github.event.inputs.environment }}-backend-service
          FAMILY: splitwise-lite-${{ github.event.inputs.environment }}-backend-task
          ALB_URL: ${{ github.event.inputs.environment == 'production' && vars.ALB_URL_PROD || vars.ALB_URL_STAGING }}
          MAX_ATTEMPTS: "3"
        run: |
          # 1. Obtener la task definition actual
          echo "Fetching current task definition for backend..."
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query "services[0].taskDefinition" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          CURRENT_REV=$(echo "$CURRENT_TD_ARN" | awk -F':' '{print $NF}')
          echo "Current revision: $CURRENT_REV"

          # 2. Obtener las últimas N revisiones inactivas
          echo "Fetching last $MAX_ATTEMPTS inactive revisions..."
          INACTIVE_TDS=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --status INACTIVE \
            --sort DESC \
            --query "taskDefinitionArns[:${MAX_ATTEMPTS}]" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          if [ -z "$INACTIVE_TDS" ] || [ "$INACTIVE_TDS" = "None" ]; then
            echo "ERROR: No inactive revisions found for rollback."
            exit 1
          fi

          # 3. Intentar rollback con cada revisión hasta encontrar una que funcione
          ROLLBACK_SUCCESS=false
          ATTEMPT=0

          for PREVIOUS_TD_ARN in $INACTIVE_TDS; do
            ATTEMPT=$((ATTEMPT + 1))
            PREVIOUS_REV=$(echo "$PREVIOUS_TD_ARN" | awk -F':' '{print $NF}')
            echo ""
            echo "=== Attempt $ATTEMPT/$MAX_ATTEMPTS: trying revision $PREVIOUS_REV ==="

            # Re-registrar como nueva revisión ACTIVE
            echo "Re-registering config from rev $PREVIOUS_REV..."
            aws ecs describe-task-definition \
              --task-definition "$PREVIOUS_TD_ARN" \
              --query "taskDefinition.{family:family,containerDefinitions:containerDefinitions,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory}" \
              --output json \
              --region "${{ vars.TF_REGION_NAME }}" > /tmp/td_rollback.json

            NEW_TD_ARN=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/td_rollback.json \
              --query "taskDefinition.taskDefinitionArn" \
              --output text \
              --region "${{ vars.TF_REGION_NAME }}")

            NEW_REV=$(echo "$NEW_TD_ARN" | awk -F':' '{print $NF}')
            echo "New ACTIVE revision: $NEW_REV (config from rev $PREVIOUS_REV)"

            # Desplegar
            echo "Updating service..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$NEW_TD_ARN" \
              --force-new-deployment \
              --region "${{ vars.TF_REGION_NAME }}" > /dev/null

            # Esperar estabilización
            echo "Waiting for deployment to stabilize..."
            if aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --region "${{ vars.TF_REGION_NAME }}" 2>/dev/null; then

              # Healthcheck: verificar que la app responde
              echo "Running healthcheck against backend..."
              sleep 10
              if curl -sf --max-time 10 "${ALB_URL}/health" > /dev/null 2>&1; then
                echo "Healthcheck PASSED. Rollback successful!"
                echo "Backend rollback complete (rev $CURRENT_REV → $NEW_REV, config from rev $PREVIOUS_REV)."
                ROLLBACK_SUCCESS=true
                break
              else
                echo "Healthcheck FAILED. Trying next revision..."
              fi
            else
              echo "Service did not stabilize. Trying next revision..."
            fi
          done

          if [ "$ROLLBACK_SUCCESS" = false ]; then
            echo ""
            echo "ERROR: All $MAX_ATTEMPTS rollback attempts failed."
            echo "Manual intervention required."
            exit 1
          fi

      - name: Rollback frontend service
        if: github.event.inputs.component == 'frontend' || github.event.inputs.component == 'ambos'
        env:
          CLUSTER: splitwise-lite-${{ github.event.inputs.environment }}-ecs-cluster
          SERVICE: splitwise-lite-${{ github.event.inputs.environment }}-frontend-service
          FAMILY: splitwise-lite-${{ github.event.inputs.environment }}-frontend-task
          ALB_URL: ${{ github.event.inputs.environment == 'production' && vars.ALB_URL_PROD || vars.ALB_URL_STAGING }}
          MAX_ATTEMPTS: "3"
        run: |
          # 1. Obtener la task definition actual
          echo "Fetching current task definition for frontend..."
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query "services[0].taskDefinition" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          CURRENT_REV=$(echo "$CURRENT_TD_ARN" | awk -F':' '{print $NF}')
          echo "Current revision: $CURRENT_REV"

          # 2. Obtener las últimas N revisiones inactivas
          echo "Fetching last $MAX_ATTEMPTS inactive revisions..."
          INACTIVE_TDS=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --status INACTIVE \
            --sort DESC \
            --query "taskDefinitionArns[:${MAX_ATTEMPTS}]" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          if [ -z "$INACTIVE_TDS" ] || [ "$INACTIVE_TDS" = "None" ]; then
            echo "ERROR: No inactive revisions found for rollback."
            exit 1
          fi

          # 3. Intentar rollback con cada revisión hasta encontrar una que funcione
          ROLLBACK_SUCCESS=false
          ATTEMPT=0

          for PREVIOUS_TD_ARN in $INACTIVE_TDS; do
            ATTEMPT=$((ATTEMPT + 1))
            PREVIOUS_REV=$(echo "$PREVIOUS_TD_ARN" | awk -F':' '{print $NF}')
            echo ""
            echo "=== Attempt $ATTEMPT/$MAX_ATTEMPTS: trying revision $PREVIOUS_REV ==="

            # Re-registrar como nueva revisión ACTIVE
            echo "Re-registering config from rev $PREVIOUS_REV..."
            aws ecs describe-task-definition \
              --task-definition "$PREVIOUS_TD_ARN" \
              --query "taskDefinition.{family:family,containerDefinitions:containerDefinitions,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory}" \
              --output json \
              --region "${{ vars.TF_REGION_NAME }}" > /tmp/td_rollback.json

            NEW_TD_ARN=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/td_rollback.json \
              --query "taskDefinition.taskDefinitionArn" \
              --output text \
              --region "${{ vars.TF_REGION_NAME }}")

            NEW_REV=$(echo "$NEW_TD_ARN" | awk -F':' '{print $NF}')
            echo "New ACTIVE revision: $NEW_REV (config from rev $PREVIOUS_REV)"

            # Desplegar
            echo "Updating service..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$NEW_TD_ARN" \
              --force-new-deployment \
              --region "${{ vars.TF_REGION_NAME }}" > /dev/null

            # Esperar estabilización
            echo "Waiting for deployment to stabilize..."
            if aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --region "${{ vars.TF_REGION_NAME }}" 2>/dev/null; then

              # Healthcheck: verificar que el frontend responde
              echo "Running healthcheck against frontend..."
              sleep 10
              if curl -sf --max-time 10 "${ALB_URL}/" > /dev/null 2>&1; then
                echo "Healthcheck PASSED. Rollback successful!"
                echo "Frontend rollback complete (rev $CURRENT_REV → $NEW_REV, config from rev $PREVIOUS_REV)."
                ROLLBACK_SUCCESS=true
                break
              else
                echo "Healthcheck FAILED. Trying next revision..."
              fi
            else
              echo "Service did not stabilize. Trying next revision..."
            fi
          done

          if [ "$ROLLBACK_SUCCESS" = false ]; then
            echo ""
            echo "ERROR: All $MAX_ATTEMPTS rollback attempts failed."
            echo "Manual intervention required."
            exit 1
          fi

      - name: Confirm rollback
        run: |
          echo "Rollback completed in ${{ github.event.inputs.environment }} (${{ github.event.inputs.component }})."
          echo "Services reverted to a verified working task definition."
