          python-version: '3.12'

      # 3. Install test dependencies
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/tests/requirements.txt

      # 4. Wait for application to be ready
      - name: Wait for application readiness
        env:
          APP_BASE_URL: ${{ needs.deploy-base-tf-prod.outputs.alb_url_prod }}
        run: |
          echo "Waiting for $APP_BASE_URL to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "$APP_BASE_URL" > /dev/null 2>&1; then
              echo "Application is ready after attempt $i"
              exit 0
  
            fi

            echo "Attempt $i/30: not ready, retrying in 5s..."
            sleep 5
          done

          echo "ERROR: Application not ready after 150s"
          exit 1

      # 5. Run smoke tests against production
      - name: Run Smoke Tests against Production
        env:
          APP_BASE_URL: ${{ needs.deploy-base-tf-prod.outputs.alb_url_prod }}
        run: pytest src/tests/smoke/test_smoke.py

  rollback-prod:
    runs-on: ubuntu-latest
    needs: [deploy-base-tf-prod, smoke-test-prod]
    if: |
      always() &&
      needs.smoke-test-prod.result == 'failure'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.TF_REGION_NAME }}

      - name: Rollback backend to previous task definition
        run: |
          CLUSTER="${{ needs.deploy-base-tf-prod.outputs.ecs_cluster_name_prod }}"
          SERVICE="splitwise-lite-production-backend-service"
          FAMILY="splitwise-lite-production-backend-task"

          # 1. Obtener la task definition actual
          echo "Fetching current task definition for backend..."
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query "services[0].taskDefinition" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          CURRENT_REV=$(echo "$CURRENT_TD_ARN" | awk -F':' '{print $NF}')
          echo "Current revision: $CURRENT_REV"

          # 2. Buscar la revisión anterior (Terraform desactiva las anteriores)
          echo "Searching for previous revision..."
          PREVIOUS_TD_ARN=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --status INACTIVE \
            --sort DESC \
            --query "taskDefinitionArns[0]" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          if [ "$PREVIOUS_TD_ARN" = "None" ] || [ -z "$PREVIOUS_TD_ARN" ]; then
            echo "ERROR: No previous revision found for rollback."
            exit 1
          fi

          PREVIOUS_REV=$(echo "$PREVIOUS_TD_ARN" | awk -F':' '{print $NF}')
          echo "Previous revision found: $PREVIOUS_REV (inactive)"

          # 3. Re-registrar la config anterior como nueva revisión ACTIVE
          echo "Re-registering previous config as new ACTIVE revision..."
          aws ecs describe-task-definition \
            --task-definition "$PREVIOUS_TD_ARN" \
            --query "taskDefinition.{family:family,containerDefinitions:containerDefinitions,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory}" \
            --output json \
            --region "${{ vars.TF_REGION_NAME }}" > /tmp/td_rollback_backend.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td_rollback_backend.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          NEW_REV=$(echo "$NEW_TD_ARN" | awk -F':' '{print $NF}')
          echo "New ACTIVE revision: $NEW_REV (config from rev $PREVIOUS_REV)"

          # 4. Actualizar el servicio con la nueva revisión
          echo "Updating service..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment \
            --region "${{ vars.TF_REGION_NAME }}"

          # 5. Esperar a que el rollback se estabilice
          echo "Waiting for backend rollback to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "${{ vars.TF_REGION_NAME }}"

          echo "Backend rollback complete (rev $CURRENT_REV → $NEW_REV, config from rev $PREVIOUS_REV)."

      - name: Rollback frontend to previous task definition
        run: |
          CLUSTER="${{ needs.deploy-base-tf-prod.outputs.ecs_cluster_name_prod }}"
          SERVICE="splitwise-lite-production-frontend-service"
          FAMILY="splitwise-lite-production-frontend-task"

          # 1. Obtener la task definition actual
          echo "Fetching current task definition for frontend..."
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query "services[0].taskDefinition" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          CURRENT_REV=$(echo "$CURRENT_TD_ARN" | awk -F':' '{print $NF}')
          echo "Current revision: $CURRENT_REV"

          # 2. Buscar la revisión anterior
          echo "Searching for previous revision..."
          PREVIOUS_TD_ARN=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --status INACTIVE \
            --sort DESC \
            --query "taskDefinitionArns[0]" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          if [ "$PREVIOUS_TD_ARN" = "None" ] || [ -z "$PREVIOUS_TD_ARN" ]; then
            echo "ERROR: No previous revision found for rollback."
            exit 1
          fi

          PREVIOUS_REV=$(echo "$PREVIOUS_TD_ARN" | awk -F':' '{print $NF}')
          echo "Previous revision found: $PREVIOUS_REV (inactive)"

          # 3. Re-registrar como nueva revisión ACTIVE
          echo "Re-registering previous config as new ACTIVE revision..."
          aws ecs describe-task-definition \
            --task-definition "$PREVIOUS_TD_ARN" \
            --query "taskDefinition.{family:family,containerDefinitions:containerDefinitions,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory}" \
            --output json \
            --region "${{ vars.TF_REGION_NAME }}" > /tmp/td_rollback_frontend.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td_rollback_frontend.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text \
            --region "${{ vars.TF_REGION_NAME }}")

          NEW_REV=$(echo "$NEW_TD_ARN" | awk -F':' '{print $NF}')
          echo "New ACTIVE revision: $NEW_REV (config from rev $PREVIOUS_REV)"

          # 4. Actualizar el servicio
          echo "Updating service..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment \
            --region "${{ vars.TF_REGION_NAME }}"

          # 5. Esperar estabilización
          echo "Waiting for frontend rollback to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "${{ vars.TF_REGION_NAME }}"

          echo "Frontend rollback complete (rev $CURRENT_REV → $NEW_REV, config from rev $PREVIOUS_REV)."
