  deploy-backend-tf-prod:
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      needs.deploy-base-tf-prod.result == 'success'
    needs: [deploy-base-tf-prod, deploy-database-tf-prod]
    defaults:
      run:
        working-directory: src/backend/infra
    outputs:
      ecs_service_name_prod: ${{ steps.get_tf_backend_outputs.outputs.ecs_service_name }}
      ecs_service_arn_prod: ${{ steps.get_tf_backend_outputs.outputs.ecs_service_arn }}

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.TF_REGION_NAME }}

      # 3. Ensure Terraform state bucket exists
      - name: Ensure Terraform State Bucket
        run: |
          if [ -z "${{ vars.TF_STATE_BUCKET_PRODUCTION }}" ]; then
            echo "Error: Debes definir la variable del repositorio TF_STATE_BUCKET."
            exit 1
          fi

          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET_PRODUCTION }}" 2>/dev/null; then
            echo "El bucket de estado ya existe."

          else
            echo "Creando bucket de estado ${{ vars.TF_STATE_BUCKET_PRODUCTION }}..."
            aws s3api create-bucket --bucket "${{ vars.TF_STATE_BUCKET_PRODUCTION }}" --region "${{ vars.TF_REGION_NAME }}"
          fi

          aws s3api put-bucket-versioning \
            --bucket "${{ vars.TF_STATE_BUCKET_PRODUCTION }}" \
            --versioning-configuration Status=Enabled

      # 4. Set up Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      # 5. Init Terraform with remote S3 backend
      - name: Terraform Init (prod)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET_PRODUCTION }}" \
            -backend-config="key=prod/backend/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_REGION_NAME }}"

      # 6. Apply Terraform (Production)
      - name: Terraform Apply (prod)
        env:
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_cors_origins: ${{ vars.CORS_ORIGINS_PRODUCTION }}
          TF_VAR_docker_image_uri: "${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-backend:${{ github.event.workflow_run.head_sha }}"
        run: |
          # Convertir "subnet-xxx,subnet-yyy" en ["subnet-xxx","subnet-yyy"] para Terraform
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          # Construir DATABASE_URL con outputs de database y secretos
          DATABASE_URL="postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@${{ needs.deploy-database-tf-prod.outputs.db_endpoint_prod }}/${{ needs.deploy-database-tf-prod.outputs.db_name_prod }}"

          # Convertir CORS_ORIGINS en lista HCL
          CORS_LIST=$(echo "${{ vars.CORS_ORIGINS_PRODUCTION }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="subnet_ids=${SUBNET_LIST}" \
            -var="database_url=${DATABASE_URL}" \
            -var="cors_origins=${CORS_LIST}"

      # 7. Export Terraform outputs
      - name: Get Terraform Backend Outputs (prod)
        id: get_tf_backend_outputs
        run: |
          ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name)

          if [ -z "$ECS_SERVICE_NAME" ]; then
            echo "Error: No se pudo obtener ecs_service_name de Terraform (prod)."
            exit 1
          fi

          echo "ECS SERVICE NAME prod: $ECS_SERVICE_NAME"
          echo "ecs_service_name=${ECS_SERVICE_NAME}" >> $GITHUB_OUTPUT

          ECS_SERVICE_ARN=$(terraform output -raw ecs_service_arn)

          if [ -z "$ECS_SERVICE_ARN" ]; then
            echo "Error: No se pudo obtener ecs_service_arn de Terraform (prod)."
            exit 1
          fi

          echo "ECS SERVICE ARN prod: $ECS_SERVICE_ARN"
          echo "ecs_service_arn=${ECS_SERVICE_ARN}" >> $GITHUB_OUTPUT

      # 8. Force new ECS deployment and wait for stability
      - name: Force New Deployment ECS Service prod for Backend
        run: |
          echo "Forcing new deployment (Backend) for prod service..."
          aws ecs update-service \
            --cluster ${{ needs.deploy-base-tf-prod.outputs.ecs_cluster_name_prod }} \
            --service ${{ steps.get_tf_backend_outputs.outputs.ecs_service_name }} \
            --force-new-deployment \
            --region "${{ vars.TF_REGION_NAME }}"

          # Esperar a que el despliegue se estabilice
          echo "Waiting for prod service deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ needs.deploy-base-tf-prod.outputs.ecs_cluster_name_prod }}\
            --services ${{ steps.get_tf_backend_outputs.outputs.ecs_service_name }} \
            --region "${{ vars.TF_REGION_NAME }}"

          echo "prod service deployment stable."


