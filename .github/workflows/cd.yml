  smoke-test-prod:
    needs: [deploy-frontend-tf-prod]
    runs-on: ubuntu-latest
    if: |
      always() && 
      github.event.workflow_run.conclusion == 'success' && 
      needs.deploy-frontend-tf-prod.result == 'success'

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install test dependencies
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/tests/requirements.txt

      # 4. Wait for application to be ready
      - name: Wait for application readiness
        env:
          APP_BASE_URL: ${{ needs.deploy-base-tf-prod.outputs.alb_url_prod }}
        run: |
          echo "Waiting for $APP_BASE_URL to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "$APP_BASE_URL" > /dev/null 2>&1; then
              echo "Application is ready after attempt $i"
              exit 0
  
            fi

            echo "Attempt $i/30: not ready, retrying in 5s..."
            sleep 5
          done

          echo "ERROR: Application not ready after 150s"
          exit 1

      # 5. Run smoke tests against production
      - name: Run Smoke Tests against Production
        env:
          APP_BASE_URL: ${{ needs.deploy-base-tf-prod.outputs.alb_url_prod }}
        run: pytest src/tests/smoke/test_smoke.py
