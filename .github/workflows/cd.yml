      # 4. Set up Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      # 5. Init Terraform with remote S3 backend
      - name: Terraform Init (prod)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET_PRODUCTION }}" \
            -backend-config="key=prod/base/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_REGION_NAME }}"

      # 6. Apply Terraform (Production)
      - name: Terraform Apply (prod)
        env:
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          # Convertir "subnet-xxx,subnet-yyy" en ["subnet-xxx","subnet-yyy"] para Terraform
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="subnet_ids=${SUBNET_LIST}"

      # 7. Export Terraform outputs
      - name: Get Terraform Base Outputs (prod)
        id: get_tf_base_outputs
        run: |
          ALB_URL=$(terraform output -raw alb_url)

          if [ -z "$ALB_URL" ]; then
            echo "Error: No se pudo obtener alb_url de Terraform (prod)."
            exit 1
          fi

          echo "ALB URL prod: $ALB_URL"
          echo "alb_url=${ALB_URL}" >> $GITHUB_OUTPUT

          ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)

          if [ -z "$ECS_CLUSTER_NAME" ]; then
