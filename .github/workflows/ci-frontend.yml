name: CI pipeline for frontend

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'

  pull_request:
    branches:
      - main
    paths:
      - 'src/frontend/**'

  workflow_dispatch:

jobs:

  lint-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      # 1. Clone repo (full history for SonarCloud blame)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install pinned dependencies
      - name: Install Node dependencies
        run: npm ci

      # 4. JS linter
      - name: Run ESLint
        run: npx eslint js/

      # 5. HTML linter
      - name: Run HTMLHint
        run: npx htmlhint index.html

      # 6. CSS linter
      - name: Run Stylelint
        run: npx stylelint css/

      # 7. Unit tests with coverage
      - name: Run tests
        run: npm test

      # 8. Upload test reports
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: |
            src/frontend/coverage/
            src/frontend/ci_frontend_unit_report.html

      # 9. Static analysis
      - name: SonarCloud Analysis
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: src/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    env:
      COMPONENT: frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: src/frontend
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Advanced Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and push image
      - name: Build and push Docker image
        id: docker_build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ env.COMPONENT }}:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ env.COMPONENT }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Export outputs for CD
      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=${{ github.event.repository.name }}-${{ env.COMPONENT }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
