name: CI pipeline for backend

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'

  pull_request:
    branches:
      - main
    paths:
      - 'src/backend/**'

  workflow_dispatch:

jobs:

  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Formatter: fails if code needs reformatting
      - name: Run Black (Formatter)
        run: black . --check

      # 5. Linter: generates report for Sonar
      - name: Run Pylint (Linter)
        continue-on-error: true
        run: pylint app --output-format=text --fail-under=9 > pylint-report.txt

      # 6. Linter: generates report for Sonar
      - name: Run Flake8 (Linter)
        continue-on-error: true
        run: flake8 app --output-file=flake8-report.txt

      # 7. Unit tests with coverage
      - name: Run Unit Tests
        run: pytest tests/unit/ --cov-report=xml:ci_unit_coverage.xml --html=ci_unit_report.html

      # 8. Integration tests against ephemeral postgres
      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
        run: pytest tests/integration/ --cov-report=xml:ci_integration_coverage.xml --html=ci_integration_report.html

      # 9. Upload reports as artifacts
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            htmlcov/
            ci_unit_coverage.xml
            ci_integration_coverage.xml
            ci_unit_report.html
            ci_integration_report.html

      # 10. Static analysis
      - name: SonarCloud Analysis
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: src/backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      COMPONENT: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: src/backend
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Advanced Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and push image
      - name: Build and push Docker image
        id: docker_build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ env.COMPONENT }}:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ env.COMPONENT }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Export outputs for CD
      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=${{ github.event.repository.name }}-${{ env.COMPONENT }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
