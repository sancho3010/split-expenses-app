repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100]
        files: ^src/backend/
        verbose: true

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--max-line-length=100]
        files: ^src/backend/
        verbose: true

  - repo: https://github.com/PyCQA/pylint
    rev: v3.3.3
    hooks:
      - id: pylint
        args: [--fail-under=9, --disable=E0401]
        files: ^src/backend/app/
        verbose: true

  - repo: local
    hooks:
      - id: pytest-unit
        name: Run unit tests
        entry: bash -c 'cd src/backend && python -m pytest tests/ -v -x'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
